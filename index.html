async function callAPI(body){
  try{
    const r=await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();return d.text||"";
  }catch{return "";}
}
async function aiChat(msg,days,history){
  const ctx=days.map(d=>`${d.date}:${d.title}`).join(";");
  return callAPI({model:"claude-haiku-4-5-20251001",max_tokens:500,
    system:`Warm Portugal trip concierge. Couple, Algarve+Lisbon, July 3-12 2026. Trip:${ctx}. Be specific, practical, max 120 words.`,
    messages:[...history,{role:"user",content:msg}]});
}
async function aiEditItem(item,req,ctx){
  const raw=await callAPI({model:"claude-haiku-4-5-20251001",max_tokens:500,
    messages:[{role:"user",content:`Portugal travel. Context:${ctx}\nItem:${JSON.stringify(item)}\nRequest:"${req}"\nReturn ONLY valid JSON same fields. No markdown.`}]});
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return null;}
}
async function aiSuggest(dayCtx,secTitle,secType,existing){
  const raw=await callAPI({model:"claude-haiku-4-5-20251001",max_tokens:400,
    messages:[{role:"user",content:`Portugal travel couple July 2026.\nDay:${dayCtx}\nSection:${secTitle}(${secType})\nExisting:${existing.map(i=>i.name||i.label).filter(Boolean).join(",")||"none"}\nSuggest ONE ${secType==="logistics"?"logistics row":"activity"}.\nJSON only:${secType==="logistics"?'{"label":"","value":""}':'{"name":"","time":"","description":"","tip":"","address":"","phone":"","link":"","bookingNote":"","mustOrder":""}'}\nNo markdown.`}]});
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return null;}
}
async function aiPhoto(b64,mime,days){
  const places=days.flatMap(d=>d.sections.flatMap(s=>s.items).map(i=>i.name||i.label).filter(Boolean).map(n=>`${d.date}:${n}`)).slice(0,20).join(",");
  const raw=await callAPI({model:"claude-haiku-4-5-20251001",max_tokens:400,
    messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mime,data:b64}},
      {type:"text",text:`Portugal photo. Places:${places}. JSON only:\n{"dayId":<1-10|null>,"location":"","caption":"<first-person 1 sentence>","story":"<2 sentences>","tips":["",""]}`}
    ]}]});
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}
  catch{return{location:"Portugal",caption:"A beautiful moment.",story:"",tips:[]};}
}

function Sheet({open,onClose,title,children}){
  const [mounted,setMounted]=useState(false);
  useEffect(()=>{if(open)setMounted(true);},[open]);
  if(!mounted)return null;
  const sheetRoot=document.getElementById("sheet-root");
  return ReactDOM.createPortal(
    <div onClick={onClose}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.72)",zIndex:9000,
        display:"flex",alignItems:"flex-end",animation:"fadeIn .18s ease",
        pointerEvents:"auto"}}>
      <div onClick={e=>e.stopPropagation()}
        style={{width:"100%",background:"#1c1c1e",borderRadius:"18px 18px 0 0",
          maxHeight:"88vh",display:"flex",flexDirection:"column",
          animation:"slideUp .3s cubic-bezier(.25,.8,.25,1)",
          paddingBottom:"max(20px,env(safe-area-inset-bottom,20px))"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}>
          <div style={{width:36,height:4,background:"#48484a",borderRadius:3}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"10px 20px 14px",borderBottom:"1px solid #2c2c2e",flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>{title}</div>
          <button onClick={onClose}
            style={{width:30,height:30,background:"#3a3a3c",borderRadius:"50%",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,color:"#aeaeb2",fontWeight:700}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"18px 20px 8px",
          WebkitOverflowScrolling:"touch"}}>
          {children}
        </div>
      </div>
    </div>,
    sheetRoot
  );
}

/* ── FORM INPUT ───────────────────────────────── */
function FI({label,val,set,multi,ph,rows=3}){
  const s={width:"100%",background:"var(--bg4)",border:"none",borderRadius:11,
    padding:"13px 14px",color:"var(--t1)",fontSize:15,outline:"none",lineHeight:1.5,resize:"none"};
  return(
    <div style={{marginBottom:14}}>
      {label&&<div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",
        letterSpacing:.9,marginBottom:6,fontWeight:800}}>{label}</div>}
      {multi
        ?<textarea value={val} onChange={e=>set(e.target.value)} placeholder={ph} rows={rows} style={s}/>
        :<input value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={s}/>}
    </div>
  );
}

/* ── ACTIVITY CARD ────────────────────────────── */
function ACard({item,theme,ctx,onUpdate,onDelete}){
  const [sh,setSh]=useState(null);
  const [d,setD]=useState({...item});
  const [aiPr,setAiPr]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  useEffect(()=>setD({...item}),[item.id]);
  const sf=(f,v)=>setD(p=>({...p,[f]:v}));
  const save=()=>{onUpdate({...d});setSh(null);};
  const doAI=async()=>{
    if(!aiPr.trim()||aiLoad)return;
    setAiLoad(true);
    const u=await aiEditItem(item,aiPr,ctx);
    setAiLoad(false);
    if(u){onUpdate({...item,...u});}
    setAiPr("");setSh(null);
  };
  return(<>
    <div onClick={()=>{setD({...item});setSh("v");}}
      style={{background:"var(--bg3)",borderRadius:16,padding:"15px 16px",marginBottom:10,cursor:"pointer"}}>
      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--t1)",marginBottom:3,overflow:"hidden",
            textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name||"Unnamed"}</div>
          {item.time&&<div style={{fontSize:13,fontWeight:700,color:theme,marginBottom:5}}>⏱ {item.time}</div>}
          {item.description&&<div style={{fontSize:14,color:"var(--t2)",lineHeight:1.45,
            display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>
            {item.description}</div>}
          {item.bookingNote&&<div style={{marginTop:8,background:"rgba(255,69,58,.12)",borderRadius:8,
            padding:"6px 10px",fontSize:12,color:"#FF6961",fontWeight:700}}>{item.bookingNote}</div>}
        </div>
        <div style={{color:"var(--t3)",fontSize:20,flexShrink:0,fontWeight:300}}>›</div>
      </div>
    </div>

    <Sheet open={sh==="v"} onClose={()=>setSh(null)} title={item.name||"Event"}>
      {item.time&&<div style={{fontSize:14,fontWeight:700,color:theme,marginBottom:12}}>⏱ {item.time}</div>}
      {item.description&&<p style={{fontSize:15,color:"var(--t2)",lineHeight:1.65,marginBottom:16}}>{item.description}</p>}
      {item.mustOrder&&<div style={{background:`${theme}1a`,borderRadius:13,padding:"13px 15px",marginBottom:14}}>
        <div style={{fontSize:11,color:theme,textTransform:"uppercase",letterSpacing:1,fontWeight:800,marginBottom:5}}>Must Order</div>
        <div style={{fontSize:14,color:"var(--t1)",lineHeight:1.5}}>{item.mustOrder}</div>
      </div>}
      {item.tip&&<div style={{background:"var(--bg4)",borderRadius:13,padding:"13px 15px",marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1,fontWeight:700,marginBottom:5}}>💡 Insider Tip</div>
        <div style={{fontSize:14,color:"var(--t2)",lineHeight:1.55}}>{item.tip}</div>
      </div>}
      {item.bookingNote&&<div style={{background:"rgba(255,69,58,.1)",borderRadius:13,padding:"13px 15px",
        marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <div style={{fontSize:13,color:"#FF6961",flex:1,fontWeight:600}}>{item.bookingNote}</div>
        {item.link&&<a href={item.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
          style={{background:"var(--red)",color:"#fff",borderRadius:9,padding:"9px 15px",fontSize:13,fontWeight:800,flexShrink:0}}>Book →</a>}
      </div>}

        {item.phone&&<div style={{fontSize:13,color:"var(--t2)"}}>📞 {item.phone}</div>}
      </div>}
      {item.link&&!item.bookingNote&&<a href={item.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}

    <Sheet open={sh==="a"} onClose={()=>setSh(null)} title="✦ AI Edit">

/* ── LOGISTICS SECTION ────────────────────────── */
function LogSec({sec,onUpdate,onDelete}){
  const [sh,setSh]=useState(null);
  const [nl,setNl]=useState("");const [nv,setNv]=useState("");
  const upd=(i,v)=>onUpdate({...sec,items:sec.items.map((x,j)=>j===i?v:x)});
  const del=(i)=>onUpdate({...sec,items:sec.items.filter((_,j)=>j!==i)});
  const add=()=>{
    if(!nl.trim()&&!nv.trim())return;
    onUpdate({...sec,items:[...sec.items,{id:uid(),label:nl,value:nv}]});
    setNl("");setNv("");setSh(null);
  };
  return(<>
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>{sec.icon}</span>
          <span style={{fontSize:14,fontWeight:800,color:"var(--t2)",textTransform:"uppercase",letterSpacing:.5}}>{sec.title}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setSh("add")}
            style={{background:"var(--bg4)",borderRadius:9,padding:"7px 14px",fontSize:13,fontWeight:800,color:"var(--t2)"}}>+ Add</button>
          <button onClick={()=>setSh("del")}
            style={{background:"rgba(255,69,58,.12)",borderRadius:9,padding:"7px 11px",fontSize:13,fontWeight:800,color:"var(--red)"}}>−</button>
        </div>
      </div>
      <div style={{background:"var(--bg3)",borderRadius:16,overflow:"hidden"}}>
        {sec.items.length===0&&<div style={{padding:"18px 16px",fontSize:14,color:"var(--t3)",textAlign:"center"}}>No rows yet — tap + Add</div>}
        {sec.items.map((item,i)=>(
          <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"13px 16px",
            borderBottom:i<sec.items.length-1?"1px solid var(--sep)":"none"}}>
            <div style={{minWidth:76,flexShrink:0}}>
              <input value={item.label} onChange={e=>upd(i,{...item,label:e.target.value})}
                style={{background:"none",border:"none",outline:"none",color:"var(--t3)",
                  fontSize:12,fontWeight:800,width:"100%",textTransform:"uppercase",letterSpacing:.4}}/>
            </div>
            <div style={{flex:1}}>
              <input value={item.value} onChange={e=>upd(i,{...item,value:e.target.value})}
                style={{background:"none",border:"none",outline:"none",color:"var(--t1)",fontSize:14,width:"100%"}}/>
            </div>
            <button onClick={()=>del(i)}
              style={{color:"var(--t4)",fontSize:22,lineHeight:"1",padding:"0 2px",flexShrink:0,fontWeight:300}}>×</button>
          </div>
        ))}
      </div>
    </div>
    <Sheet open={sh==="add"} onClose={()=>setSh(null)} title={`Add Row to ${sec.title}`}>
      <FI label="Label" val={nl} set={setNl} ph="e.g. Hotel, Tip, Flight"/>
      <FI label="Value" val={nv} set={setNv} multi ph="Details…" rows={2}/>
      <button onClick={add}
        style={{width:"100%",background:"var(--gold)",borderRadius:13,padding:"16px",
          fontSize:16,fontWeight:800,color:"#000",marginTop:4}}>Add Row</button>
    </Sheet>
    <Sheet open={sh==="del"} onClose={()=>setSh(null)} title="Delete Section">
      <p style={{fontSize:15,color:"var(--t2)",lineHeight:1.5,marginBottom:24}}>
        Delete <b style={{color:"var(--t1)"}}>{sec.title}</b> and all its rows?
      </p>
      <button onClick={()=>{onDelete();setSh(null);}}
        style={{width:"100%",background:"var(--red)",borderRadius:13,padding:"15px",
          fontSize:16,fontWeight:800,color:"#fff",marginBottom:10}}>Delete</button>
      <button onClick={()=>setSh(null)}
        style={{width:"100%",background:"var(--bg4)",borderRadius:13,padding:"15px",
          fontSize:16,fontWeight:700,color:"var(--t1)"}}>Cancel</button>
    </Sheet>
  </>);
}

/* ── ACTIVITY SECTION ─────────────────────────── */
function ActSec({sec,theme,dayCtx,onUpdate,onDelete}){
  const [sh,setSh]=useState(null);
  const [aiLoad,setAiLoad]=useState(false);
  const blank={name:"",time:"",description:"",tip:"",address:"",phone:"",link:"",bookingNote:"",mustOrder:""};
  const [draft,setDraft]=useState({...blank});
  const sf=(f,v)=>setDraft(p=>({...p,[f]:v}));
  const upd=(i,v)=>onUpdate({...sec,items:sec.items.map((x,j)=>j===i?v:x)});
  const del=(i)=>onUpdate({...sec,items:sec.items.filter((_,j)=>j!==i)});
  const add=()=>{
    if(!draft.name.trim())return;
    onUpdate({...sec,items:[...sec.items,{...draft,id:uid()}]});
    setDraft({...blank});setSh(null);
  };
  const addAI=async()=>{
    setAiLoad(true);
    const s=await aiSuggest(dayCtx,sec.title,sec.type,sec.items);
    setAiLoad(false);
    if(s)onUpdate({...sec,items:[...sec.items,{...blank,...s,id:uid()}]});
  };
  return(<>
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>{sec.icon}</span>
          <span style={{fontSize:14,fontWeight:800,color:"var(--t2)",textTransform:"uppercase",letterSpacing:.5}}>{sec.title}</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={addAI} disabled={aiLoad}
            style={{background:"var(--gold-dim)",borderRadius:9,padding:"7px 12px",fontSize:13,fontWeight:800,color:"var(--gold)"}}>
            {aiLoad?<span className="spin"/>:"✦ AI"}
          </button>
          <button onClick={()=>{setDraft({...blank});setSh("add");}}
            style={{background:"var(--bg4)",borderRadius:9,padding:"7px 14px",fontSize:13,fontWeight:800,color:"var(--t2)"}}>+ Add</button>
          <button onClick={()=>setSh("del")}
            style={{background:"rgba(255,69,58,.12)",borderRadius:9,padding:"7px 11px",fontSize:13,fontWeight:800,color:"var(--red)"}}>−</button>
        </div>
      </div>
      {sec.items.length===0
        ?<div style={{background:"var(--bg3)",borderRadius:16,padding:"22px",textAlign:"center"}}>
          <div style={{fontSize:14,color:"var(--t3)",marginBottom:14}}>No events yet</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button onClick={()=>{setDraft({...blank});setSh("add");}}
              style={{background:"var(--bg4)",borderRadius:11,padding:"11px 18px",fontSize:14,fontWeight:800,color:"var(--t2)"}}>+ Add</button>
            <button onClick={addAI} disabled={aiLoad}
              style={{background:"var(--gold-dim)",borderRadius:11,padding:"11px 18px",fontSize:14,fontWeight:800,color:"var(--gold)"}}>
              {aiLoad?<span className="spin"/>:"✦ AI Suggest"}
            </button>
          </div>
        </div>
        :sec.items.map((item,i)=>(
          <ACard key={item.id} item={item} theme={theme}
            ctx={`${dayCtx} — ${sec.title}`}
            onUpdate={v=>upd(i,v)} onDelete={()=>del(i)}/>
        ))
      }
    </div>
    <Sheet open={sh==="add"} onClose={()=>setSh(null)} title={`Add to ${sec.title}`}>
      <FI label="Name *" val={draft.name} set={v=>sf("name",v)} ph="Event or restaurant name"/>
      <FI label="Time" val={draft.time} set={v=>sf("time",v)} ph="e.g. 9:00 AM – 1:00 PM"/>
      <FI label="Description" val={draft.description} set={v=>sf("description",v)} multi ph="What is this?" rows={3}/>
      <FI label="Tip" val={draft.tip} set={v=>sf("tip",v)} multi ph="Insider tip…" rows={2}/>
      <FI label="Must Order" val={draft.mustOrder} set={v=>sf("mustOrder",v)} ph="Dishes to order"/>
      <FI label="Address" val={draft.address} set={v=>sf("address",v)} ph="Full address"/>
      <FI label="Phone" val={draft.phone} set={v=>sf("phone",v)} ph="+351…"/>
      <FI label="Link" val={draft.link} set={v=>sf("link",v)} ph="https://…"/>
      <FI label="Booking Note" val={draft.bookingNote} set={v=>sf("bookingNote",v)} ph="e.g. 🔴 BOOK NOW"/>
      <button onClick={add} disabled={!draft.name.trim()}
        style={{width:"100%",background:draft.name.trim()?"var(--gold)":"var(--bg4)",borderRadius:13,
          padding:"16px",fontSize:16,fontWeight:800,color:draft.name.trim()?"#000":"var(--t3)",marginTop:4}}>Add Event</button>
    </Sheet>
    <Sheet open={sh==="del"} onClose={()=>setSh(null)} title="Delete Section">
      <p style={{fontSize:15,color:"var(--t2)",lineHeight:1.5,marginBottom:24}}>
        Delete <b style={{color:"var(--t1)"}}>{sec.title}</b> and all its events?
      </p>
      <button onClick={()=>{onDelete();setSh(null);}}
        style={{width:"100%",background:"var(--red)",borderRadius:13,padding:"15px",
          fontSize:16,fontWeight:800,color:"#fff",marginBottom:10}}>Delete</button>
      <button onClick={()=>setSh(null)}
        style={{width:"100%",background:"var(--bg4)",borderRadius:13,padding:"15px",
          fontSize:16,fontWeight:700,color:"var(--t1)"}}>Cancel</button>
    </Sheet>
  </>);
}

/* ── MAIN APP ─────────────────────────────────── */
function App(){
  const loadState=()=>{try{const s=localStorage.getItem(LS_KEY);if(s){const p=JSON.parse(s);return{days:p.days||DAYS0,bookings:p.bookings||BOOK0};}}catch{}return{days:DAYS0,bookings:BOOK0};};
  const init=loadState();
  const [days,setDays]=useState(init.days);
  const [bookings,setBookings]=useState(init.bookings);
  const [photos,setPhotos]=useState([]);
  const [tab,setTab]=useState("trip");
  const [dayIdx,setDayIdx]=useState(0);
  const [selPhoto,setSelPhoto]=useState(null);
  const [filterDay,setFilterDay]=useState(null);
  const [chatOpen,setChatOpen]=useState(false);
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hi! I know your full Portugal itinerary. Ask me anything — restaurant swaps, weather alternatives, packing tips, day changes."}]);
  const [chatIn,setChatIn]=useState("");
  const [chatLoad,setChatLoad]=useState(false);
  const [saved,setSaved]=useState(true);
  const [secSh,setSecSh]=useState(false);
  const [newSec,setNewSec]=useState({title:"",icon:"📍",type:"activity"});
  const chatEnd=useRef();const fileRef=useRef();const saveTimer=useRef();

  useEffect(()=>{
    setSaved(false);clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      try{localStorage.setItem(LS_KEY,JSON.stringify({days,bookings}));setSaved(true);}catch{}
    },1000);
    return()=>clearTimeout(saveTimer.current);
  },[days,bookings]);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const cur=days[dayIdx];
  const updSec=useCallback((did,sid,val)=>setDays(p=>p.map(d=>d.id!==did?d:{...d,sections:d.sections.map(s=>s.id!==sid?s:val)})),[]);
  const delSec=useCallback((did,sid)=>setDays(p=>p.map(d=>d.id!==did?d:{...d,sections:d.sections.filter(s=>s.id!==sid)})),[]);
  const addSec=()=>{
    if(!newSec.title.trim())return;
    setDays(p=>p.map(d=>d.id!==cur.id?d:{...d,sections:[...d.sections,{...newSec,id:uid(),items:[]}]}));
    setNewSec({title:"",icon:"📍",type:"activity"});setSecSh(false);
  };
  const sendChat=async()=>{
    if(!chatIn.trim()||chatLoad)return;
    const msg=chatIn;setChatIn("");setChatLoad(true);
    const newMsgs=[...msgs,{role:"user",content:msg}];setMsgs(newMsgs);
    const history=newMsgs.slice(0,-1).map(m=>({role:m.role,content:m.content}));
    const reply=await aiChat(msg,days,history);
    setMsgs(p=>[...p,{role:"assistant",content:reply||"Sorry, couldn't reach AI right now."}]);
    setChatLoad(false);
  };
  const processFile=useCallback(async(file)=>{
    if(!file.type.startsWith("image/"))return;
    const url=URL.createObjectURL(file);const id=Date.now()+Math.random();
    setPhotos(p=>[...p,{id,url,loading:true}]);
    const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(file);});
    try{const info=await aiPhoto(b64,file.type,days);setPhotos(p=>p.map(ph=>ph.id!==id?ph:{...ph,loading:false,...info}));}
    catch{setPhotos(p=>p.map(ph=>ph.id!==id?ph:{...ph,loading:false,location:"Portugal",caption:"A beautiful moment."}));}
  },[days]);
  const filtered=filterDay?photos.filter(p=>p.dayId===filterDay):photos;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",
      paddingTop:"var(--top)",background:"var(--bg)"}}>

      {/* HEADER */}
      <div style={{background:"var(--bg)",borderBottom:"1px solid var(--sep)",
        padding:"14px 20px 0",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:11,color:"var(--gold)",fontWeight:800,letterSpacing:1.2,
              textTransform:"uppercase",marginBottom:3}}>July 3–12, 2026</div>
            <div style={{fontSize:22,fontWeight:800,color:"var(--t1)"}}>🇵🇹 Portugal</div>
          </div>
          <div style={{display:"flex",gap:9,alignItems:"center"}}>
            <div style={{fontSize:11,fontWeight:800,color:saved?"var(--green)":"var(--t3)"}}>
              {saved?"✓ Saved":"Saving…"}</div>
            <button onClick={()=>setChatOpen(o=>!o)}
              style={{background:chatOpen?"var(--gold)":"var(--bg3)",borderRadius:22,
                padding:"9px 18px",fontSize:14,fontWeight:800,
                color:chatOpen?"#000":"var(--gold)",
                border:`1.5px solid ${chatOpen?"var(--gold)":"transparent"}`}}>
              ✦ AI</button>
          </div>
        </div>
        <div style={{display:"flex",gap:0}}>
          {[["trip","🗺 Trip"],["bookings","📋 Book"],["photos","📸 Photos"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{flex:1,padding:"10px 8px",fontSize:13,fontWeight:800,
                color:tab===id?"var(--gold)":"var(--t3)",background:"none",border:"none",
                borderBottom:`2.5px solid ${tab===id?"var(--gold)":"transparent"}`,transition:"all .15s"}}>
              {label}</button>
          ))}
        </div>
      </div>

      {/* AI CHAT */}
      {chatOpen&&(
        <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--sep)",flexShrink:0}}>
          <div style={{padding:"14px 16px",maxHeight:"32vh",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&<div style={{color:"var(--gold)",fontSize:16,flexShrink:0,marginTop:3}}>✦</div>}
                <div style={{maxWidth:"82%",background:m.role==="user"?"var(--gold-dim)":"var(--bg3)",
                  borderRadius:14,padding:"10px 14px",fontSize:14,color:"var(--t1)",
                  lineHeight:1.55,whiteSpace:"pre-wrap",fontWeight:m.role==="user"?700:400}}>
                  {m.content}</div>
              </div>
            ))}
            {chatLoad&&<div style={{display:"flex",gap:8}}>
              <div style={{color:"var(--gold)"}}>✦</div>
              <div style={{background:"var(--bg3)",borderRadius:14,padding:"10px 14px",fontSize:14,color:"var(--t3)"}}>Thinking…</div>
            </div>}
            <div ref={chatEnd}/>
          </div>
          <div style={{borderTop:"1px solid var(--sep)",padding:"10px 14px",display:"flex",gap:8}}>
            <input value={chatIn} onChange={e=>setChatIn(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Ask about your trip…"
              style={{flex:1,background:"var(--bg3)",border:"none",borderRadius:22,
                padding:"11px 16px",color:"var(--t1)",fontSize:15,outline:"none",fontWeight:600}}/>
            <button onClick={sendChat} disabled={chatLoad||!chatIn.trim()}
              style={{background:chatLoad||!chatIn.trim()?"var(--bg4)":"var(--gold)",
                borderRadius:22,padding:"11px 20px",fontSize:18,fontWeight:800,
                color:chatLoad||!chatIn.trim()?"var(--t3)":"#000",flexShrink:0}}>↑</button>
          </div>
        </div>
      )}

      {/* CONTENT AREA */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>

        {/* ══ TRIP ══ */}
        {tab==="trip"&&(
          <div>
            {/* Day picker */}
            <div style={{display:"flex",gap:8,overflowX:"auto",padding:"16px 16px 6px",scrollbarWidth:"none"}}>
              {days.map((d,i)=>(
                <button key={d.id} onClick={()=>setDayIdx(i)}
                  style={{flexShrink:0,background:dayIdx===i?d.theme:"var(--bg3)",
                    borderRadius:16,padding:"11px 14px",textAlign:"center",minWidth:66,
                    border:"none",transition:"all .2s",
                    boxShadow:dayIdx===i?`0 4px 16px ${d.theme}44`:"none"}}>
                  <div style={{fontSize:22,marginBottom:3}}>{d.emoji}</div>
                  <div style={{fontSize:12,fontWeight:800,color:dayIdx===i?"#fff":"var(--t2)"}}>
                    {d.date.split(" ")[1]}</div>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",
                    color:dayIdx===i?"rgba(255,255,255,.65)":"var(--t4)",marginTop:2}}>
                    {d.label}</div>
                </button>
              ))}
            </div>

            {/* Day header */}
            <div style={{margin:"12px 16px",background:`linear-gradient(135deg,${cur.theme}25,${cur.theme}08)`,
              borderRadius:18,padding:"17px 20px",border:`1px solid ${cur.theme}30`}}>
              <div style={{fontSize:11,color:cur.theme,fontWeight:800,letterSpacing:1.2,
                textTransform:"uppercase",marginBottom:5}}>{cur.date} · {cur.day}</div>
              <input value={cur.title}
                onChange={e=>setDays(p=>p.map(d=>d.id!==cur.id?d:{...d,title:e.target.value}))}
                style={{background:"none",border:"none",outline:"none",fontSize:19,
                  fontWeight:800,color:"var(--t1)",width:"100%"}}/>
            </div>

            {/* Sections */}
            <div style={{padding:"0 16px"}}>
              {cur.sections.map(sec=>(
                <div key={sec.id}>
                  {sec.type==="logistics"
                    ?<LogSec sec={sec}
                        onUpdate={val=>updSec(cur.id,sec.id,val)}
                        onDelete={()=>delSec(cur.id,sec.id)}/>
                    :<ActSec sec={sec} theme={cur.theme}
                        dayCtx={`${cur.date} ${cur.day} — ${cur.title}`}
                        onUpdate={val=>updSec(cur.id,sec.id,val)}
                        onDelete={()=>delSec(cur.id,sec.id)}/>
                  }
                </div>
              ))}
            </div>

            {/* Add section button */}
            <div style={{padding:"4px 16px 120px"}}>
              <button onClick={()=>setSecSh(true)}
                style={{width:"100%",background:"var(--bg3)",borderRadius:16,padding:"18px",
                  fontSize:15,fontWeight:700,color:"var(--t3)",border:"1.5px dashed var(--sep)"}}>
                + Add Section to {cur.date}</button>
            </div>
          </div>
        )}

        {/* ══ BOOKINGS ══ */}
        {tab==="bookings"&&(
          <div style={{padding:"20px 16px 120px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontSize:24,fontWeight:800}}>Bookings</div>
              <button
                onClick={()=>setBookings(p=>[...p,{id:uid(),p:"medium",when:"",night:"",name:"New booking",action:"",link:"",done:false}])}
                style={{background:"var(--gold-dim)",borderRadius:11,padding:"9px 16px",
                  fontSize:14,fontWeight:800,color:"var(--gold)"}}>+ Add</button>
            </div>
            {["critical","high","medium"].map(priority=>(
              <div key={priority} style={{marginBottom:28}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <div style={{width:9,height:9,borderRadius:"50%",background:PC[priority]}}/>
                  <div style={{fontSize:12,fontWeight:800,color:PC[priority],
                    letterSpacing:1.5,textTransform:"uppercase"}}>{PL[priority]}</div>
                </div>
                {bookings.filter(b=>b.p===priority).length===0&&(
                  <div style={{fontSize:13,color:"var(--t4)",fontStyle:"italic",paddingLeft:4}}>None</div>
                )}
                {bookings.filter(b=>b.p===priority).map(item=>(
                  <div key={item.id}
                    style={{background:"var(--bg3)",borderRadius:16,padding:"15px 16px",marginBottom:10,
                      borderLeft:`3.5px solid ${item.done?"var(--bg5)":PC[item.p]}`,
                      opacity:item.done?.5:1,transition:"opacity .2s"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                      <input type="checkbox" checked={item.done}
                        onChange={e=>setBookings(p=>p.map(b=>b.id!==item.id?b:{...b,done:e.target.checked}))}
                        style={{width:22,height:22,marginTop:1,accentColor:PC[item.p],flexShrink:0,cursor:"pointer"}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <input value={item.name}
                          onChange={e=>setBookings(p=>p.map(b=>b.id!==item.id?b:{...b,name:e.target.value}))}
                          style={{background:"none",border:"none",outline:"none",fontSize:15,fontWeight:800,
                            color:"var(--t1)",textDecoration:item.done?"line-through":"none",width:"100%",marginBottom:4}}/>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                          <input value={item.night}
                            onChange={e=>setBookings(p=>p.map(b=>b.id!==item.id?b:{...b,night:e.target.value}))}
                            placeholder="Date"
                            style={{background:"none",border:"none",outline:"none",fontSize:13,
                              color:"var(--t3)",width:70,fontFamily:"inherit",fontWeight:600}}/>
                          <span style={{color:"var(--t4)"}}>·</span>
                          <input value={item.action}
                            onChange={e=>setBookings(p=>p.map(b=>b.id!==item.id?b:{...b,action:e.target.value}))}
                            placeholder="How to book"
                            style={{background:"none",border:"none",outline:"none",fontSize:13,
                              color:"var(--t3)",flex:1,minWidth:80,fontFamily:"inherit"}}/>
                        </div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:7,alignItems:"flex-end",flexShrink:0}}>
                        {item.link&&<a href={item.link} target="_blank" rel="noreferrer"
                          style={{background:PC[item.p],color:"#fff",borderRadius:9,
                            padding:"7px 13px",fontSize:12,fontWeight:800}}>Book →</a>}
                        <button onClick={()=>setBookings(p=>p.filter(b=>b.id!==item.id))}
                          style={{fontSize:20,color:"var(--t4)",lineHeight:1,padding:"0 2px"}}>×</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* ══ PHOTOS ══ */}
        {tab==="photos"&&(
          <div style={{padding:"16px 16px 120px"}}>
            {photos.length>0&&(
              <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,scrollbarWidth:"none"}}>
                <button onClick={()=>setFilterDay(null)}
                  style={{flexShrink:0,background:!filterDay?"var(--gold)":"var(--bg3)",
                    borderRadius:20,padding:"7px 16px",fontSize:13,fontWeight:800,
                    color:!filterDay?"#000":"var(--t2)"}}>All ({photos.length})</button>
                {days.filter(d=>photos.some(p=>p.dayId===d.id)).map(d=>(
                  <button key={d.id} onClick={()=>setFilterDay(d.id)}
                    style={{flexShrink:0,background:filterDay===d.id?d.theme:"var(--bg3)",
                      borderRadius:20,padding:"7px 14px",fontSize:13,fontWeight:800,
                      color:filterDay===d.id?"#fff":"var(--t2)"}}>
                    {d.emoji} {d.date}</button>
                ))}
              </div>
            )}
            {filtered.length===0?(
              <div style={{textAlign:"center",padding:"60px 20px"}}>
                <div style={{fontSize:64,marginBottom:18}}>📸</div>
                <div style={{fontSize:22,fontWeight:800,marginBottom:10}}>No Photos Yet</div>
                <div style={{fontSize:15,color:"var(--t3)",marginBottom:28,lineHeight:1.5}}>
                  Upload your Portugal memories — AI captions and tags them by day</div>
                <button onClick={()=>fileRef.current.click()}
                  style={{background:"var(--gold)",color:"#000",borderRadius:15,
                    padding:"16px 32px",fontSize:16,fontWeight:800}}>Upload Photos</button>
                <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
                  onChange={async e=>{for(const f of Array.from(e.target.files))await processFile(f);e.target.value="";}}/>
              </div>
            ):(
              <>
                <div style={{columns:"2",columnGap:10}}>
                  {filtered.map(p=>{
                    const d=days.find(x=>x.id===p.dayId);
                    return(
                      <div key={p.id} onClick={()=>setSelPhoto(p)}
                        style={{breakInside:"avoid",marginBottom:10,borderRadius:16,
                          overflow:"hidden",background:"var(--bg3)",cursor:"pointer"}}>
                        <div style={{position:"relative"}}>
                          <img src={p.url} alt="" style={{width:"100%",display:"block",opacity:p.loading?.35:1}}/>
                          {p.loading&&<div style={{position:"absolute",inset:0,display:"flex",
                            alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.6)"}}>
                            <div className="spin"/></div>}
                          {!p.loading&&d&&<div style={{position:"absolute",top:8,left:8,
                            background:d.theme+"ee",borderRadius:7,padding:"3px 9px",
                            fontSize:10,fontWeight:800,color:"#fff"}}>{d.date}</div>}
                          <button onClick={e=>{e.stopPropagation();setPhotos(px=>px.filter(x=>x.id!==p.id));}}
                            style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.7)",
                              borderRadius:"50%",width:26,height:26,fontSize:14,color:"#fff",
                              display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>×</button>
                        </div>
                        {!p.loading&&p.caption&&(
                          <div style={{padding:"9px 11px",fontSize:12,color:"var(--t2)",
                            lineHeight:1.45,fontStyle:"italic"}}>"{p.caption}"</div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <button onClick={()=>fileRef.current.click()}
                  style={{width:"100%",background:"var(--bg3)",borderRadius:16,padding:"18px",
                    fontSize:15,fontWeight:700,color:"var(--t3)",border:"1.5px dashed var(--sep)",marginTop:4}}>
                  + Add More Photos</button>
                <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
                  onChange={async e=>{for(const f of Array.from(e.target.files))await processFile(f);e.target.value="";}}/>
              </>
            )}
          </div>
        )}
      </div>

      {/* BOTTOM TAB BAR */}
      <div style={{background:"rgba(13,13,13,.97)",borderTop:"1px solid var(--sep)",
        display:"flex",justifyContent:"space-around",alignItems:"center",
        padding:"10px 0",paddingBottom:"calc(10px + var(--bot))",flexShrink:0,
        backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)"}}>
        {[["trip","🗺","Trip"],["bookings","📋","Book"],["photos","📸","Photos"]].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{display:"flex",flexDirection:"column",alignItems:"center",
              gap:3,padding:"4px 24px",border:"none",background:"none"}}>
            <div style={{fontSize:24}}>{icon}</div>
            <div style={{fontSize:10,fontWeight:800,
              color:tab===id?"var(--gold)":"var(--t3)",letterSpacing:.4}}>
              {label}</div>
          </button>
        ))}
      </div>

      {/* ADD SECTION SHEET */}
      <Sheet open={secSh} onClose={()=>setSecSh(false)} title="Add Section">
        <div style={{display:"grid",gridTemplateColumns:"58px 1fr",gap:12,marginBottom:16}}>
          <input value={newSec.icon} onChange={e=>setNewSec(p=>({...p,icon:e.target.value}))}
            style={{background:"var(--bg4)",border:"none",borderRadius:11,padding:"12px",
              fontSize:26,textAlign:"center",outline:"none",color:"var(--t1)"}}/>
          <input value={newSec.title} onChange={e=>setNewSec(p=>({...p,title:e.target.value}))}
            placeholder="Section title"
            style={{background:"var(--bg4)",border:"none",borderRadius:11,padding:"13px 14px",
              fontSize:15,fontWeight:700,outline:"none",color:"var(--t1)"}}/>
        </div>
        <div style={{marginBottom:8,fontSize:11,color:"var(--t3)",textTransform:"uppercase",
          letterSpacing:.9,fontWeight:800}}>Type</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:24}}>
          {["activity","dinner","logistics"].map(t=>(
            <button key={t} onClick={()=>setNewSec(p=>({...p,type:t}))}
              style={{background:newSec.type===t?"var(--gold)":"var(--bg4)",borderRadius:11,
                padding:"13px 8px",fontSize:13,fontWeight:800,
                color:newSec.type===t?"#000":"var(--t2)",textTransform:"capitalize"}}>{t}</button>
          ))}
        </div>
        <button onClick={addSec} disabled={!newSec.title.trim()}
          style={{width:"100%",background:newSec.title.trim()?"var(--gold)":"var(--bg4)",
            borderRadius:13,padding:"16px",fontSize:16,fontWeight:800,
            color:newSec.title.trim()?"#000":"var(--t3)"}}>Add Section</button>
      </Sheet>

      {/* PHOTO DETAIL SHEET */}
      <Sheet open={!!selPhoto} onClose={()=>setSelPhoto(null)} title={selPhoto?.location||"Photo"}>
        {selPhoto&&<>
          <img src={selPhoto.url} alt="" style={{width:"100%",borderRadius:14,
            maxHeight:260,objectFit:"cover",marginBottom:16,display:"block"}}/>
          {selPhoto.caption&&<p style={{fontSize:17,color:"var(--t1)",fontStyle:"italic",
            lineHeight:1.65,marginBottom:14,fontWeight:600}}>"{selPhoto.caption}"</p>}
          {selPhoto.story&&<p style={{fontSize:14,color:"var(--t2)",lineHeight:1.75,marginBottom:14}}>{selPhoto.story}</p>}
          {selPhoto.tips?.length>0&&<div style={{background:"var(--bg4)",borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"var(--gold)",textTransform:"uppercase",
              letterSpacing:1.2,fontWeight:800,marginBottom:10}}>💡 Tips</div>
            {selPhoto.tips.map((t,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:i<selPhoto.tips.length-1?8:0}}>
                <span style={{color:"var(--gold)",fontWeight:800}}>→</span>
                <span style={{fontSize:14,color:"var(--t2)",lineHeight:1.5}}>{t}</span>
              </div>
            ))}
          </div>}
        </>}
      </Sheet>

      {/* RESET */}
      <button onClick={()=>{if(confirm("Reset everything to original itinerary?")){
        localStorage.removeItem(LS_KEY);setDays(DAYS0);setBookings(BOOK0);}}}
        style={{position:"fixed",bottom:"calc(72px + var(--bot))",right:16,
          background:"var(--bg3)",borderRadius:20,padding:"7px 13px",
          fontSize:11,fontWeight:800,color:"var(--t3)",border:"1px solid var(--sep)",zIndex:100}}>
        Reset</button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
